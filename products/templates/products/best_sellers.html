{% extends 'base/base.html' %}
{% load static %}

{% block contents %}
<div class="container">
    <div id="container">
        <div class="container">
            <ul class="breadcrumb">
                <li><a href="{% url 'home' %}"><i class="fa fa-home"></i></a></li>
                <li>New Arrivals</li>
            </ul>
            <h1 class="title">Best Sellers</h1>
            <div class="row products-category">
                {% for product in products %}
                <div class="product-layout col-sm-3">
                    <div class="product-thumb">
                        <div class="image">
                            <a href="{% url 'products:product_detail' product.slug %}">
                                {% if product.image %}
                                <img src="{{ product.image.url }}" alt="{{ product.name }}" class="img-responsive" style="width:200px; height:200px; object-fit:cover;"/>
                                {% else %}
                                <img src="{% static 'image/product/no-image.jpg' %}" alt="{{ product.name }}" class="img-responsive" style="width:200px; height:200px; object-fit:cover;"/>
                                {% endif %}
                            </a>
                        </div>
                        <div class="caption">
                            <h4><a href="{% url 'products:product_detail' product.slug %}">{{ product.name }}</a></h4>
                            <p class="price">{{ product.price }}</p>
                        </div>
                        <div class="button-group">
                            <a href="{% url 'products:cart_add' product.id %}" class="btn-primary"><span>Add to Cart</span></a>
                        </div>
                    </div>
                </div>
                {% empty %}
                <p>No products available.</p>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
