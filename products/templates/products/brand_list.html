{% extends 'base/base.html' %}
{% load static %}

{% block contents %}
<div class="container">
    <ul class="breadcrumb">
        <li><a href="{% url 'home' %}"><i class="fa fa-home"></i></a></li>
        <li>Brands</li>
    </ul>

    <h1 class="title">All Brands</h1>

    <div class="row" style="margin-top:20px;">
        {% for brand in brands %}
        <div class="col-sm-3 text-center" style="margin-bottom:30px;">
            <a href="{% url 'products:brand_detail' brand.slug %}">
                {% if brand.logo %}
                <img src="{{ brand.logo.url }}" alt="{{ brand.name }}" style="max-height:80px; max-width:100%; object-fit:contain;">
                {% else %}
                <div style="height:80px; display:flex; align-items:center; justify-content:center; background:#f5f5f5; border-radius:4px;">
                    {{ brand.name }}
                </div>
                {% endif %}
                <p style="margin-top:10px; font-weight:bold;">{{ brand.name }}</p>
            </a>
        </div>
        {% empty %}
        <p>No brands available.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
