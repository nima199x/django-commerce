{% extends 'base/base.html' %}
{% load static %}

{% block contents %}
<div class="container">
    <ul class="breadcrumb">
        <li><a href="{% url 'home' %}"><i class="fa fa-home"></i></a></li>
        <li>My Account</li>
    </ul>

    <h1 class="title">My Account</h1>

    <div class="row">
        <div class="col-sm-6">
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" class="form-control" value="{{ request.user.username }}" disabled>
                </div>
                <div class="form-group">
                    <label>First Name</label>
                    {{ form.first_name }}
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    {{ form.last_name }}
                </div>
                <div class="form-group">
                    <label>Email</label>
                    {{ form.email }}
                </div>
                <button type="submit" class="btn-primary" style="margin-top:15px;">
                    <span>Save Changes</span>
                </button>
            </form>
        </div>

        <div class="col-sm-6">
            <h3 class="subtitle">Quick Links</h3>
            <ul class="list-group">
                <li class="list-group-item"><a href="{% url 'products:order_history' %}">Order History</a></li>
                <li class="list-group-item"><a href="{% url 'products:wishlist_detail' %}">Wish List</a></li>
                <li class="list-group-item"><a href="{% url 'products:compare_detail' %}">Compare Products</a></li>
            </ul>
        </div>
    </div>
</div>
{% endblock %}
